app = 'ai-extension-backend-twilight-forest-3247'
primary_region = 'iad'

[build]

[env]
  NODE_OPTIONS = "--max-old-space-size=512"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '2gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 2048
